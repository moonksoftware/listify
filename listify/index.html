<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonK Software</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .container { text-align: center; max-width: 600px; }
        h1 { font-size: 2.5rem; color: #1d1d1f; margin-bottom: 10px; }
        p { color: #86868b; font-size: 1.1rem; margin-bottom: 40px; }
        .apps { display: flex; flex-direction: column; gap: 20px; }
        .app-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-decoration: none; color: inherit; transition: transform 0.2s; }
        .app-card:hover { transform: translateY(-4px); }
        .app-card h2 { color: #1d1d1f; margin-bottom: 8px; }
        .app-card p { color: #86868b; margin: 0; font-size: 0.95rem; }
        footer { margin-top: 60px; color: #86868b; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MoonK Software</h1>
        <p>Simple apps for everyday life</p>
        <div class="apps">
            <a href="/listify" class="app-card">
                <h2>Listify</h2>
                <p>You add, we organize - Shopping lists & checklists made simple</p>
            </a>
        </div>
        <footer>&copy; 2025 MoonK Software. All rights reserved.</footer>
    </div>
</body>
</html>
